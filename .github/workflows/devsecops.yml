name: 🚀 Frontend DevSecOps CI Pipeline

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  # ==========================================
  # JOB 1: FRONTEND CI & SECURITY (Angular)
  # ==========================================
  frontend-ci:
    runs-on: ubuntu-latest
    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json # Pointed directly at root

      - name: 📦 Install Dependencies
        run: npm ci

      - name: 🛡️ Security - npm Audit
        run: npm audit --audit-level=high

      - name: 🔨 Build Angular App
        run: npx ng build --configuration production

  # ==========================================
  # JOB 2: STATIC CODE ANALYSIS (CodeQL)
  # ==========================================
  codeql-security:
    name: 🛡️ CodeQL Static Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      - name: ⚙️ Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: "javascript-typescript" # Stripped out csharp

      # Angular is interpreted, so CodeQL doesn't require a manual build step step here!
      
      - name: 🔍 Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
